services:
  # 1. The Receptionist (Faces the public internet)
  reverse-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  # 2. The Actual Website (Hidden inside the internal network)
  lamigo-frontend:
    image: nginx:latest
    volumes:
      - ./frontend:/usr/share/nginx/html

  # 3. The Database Vault
  database-storage:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - luvo-db-vault:/var/lib/postgresql

volumes:
  luvo-db-vault:
