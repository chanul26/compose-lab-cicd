services:
  reverse-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    # This is the fix! It forces the proxy to wait.
    depends_on:
      - lamigo-frontend

  lamigo-frontend:
    image: nginx:latest
    volumes:
      - ./frontend:/usr/share/nginx/html

  database-storage:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - luvo-db-vault:/var/lib/postgresql

volumes:
  luvo-db-vault:
