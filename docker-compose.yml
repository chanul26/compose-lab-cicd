services:
  web-frontend:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      # This line mounts our custom routing rules into Nginx!
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf	

  database-storage:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - luvo-db-vault:/var/lib/postgresql

volumes:
  luvo-db-vault:
